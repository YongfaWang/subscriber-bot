name: Auto Fetch Subscription

on:
  schedule:
    - cron: '*/3 * * * *'
  workflow_dispatch:
  push:

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Chromium
        run: |
          npx puppeteer browsers install chrome
          echo "PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=false" >> $GITHUB_ENV

      - name: Configure Git
        run: |
          git config --local user.name "GitHub Actions Bot"
          git config --local user.email "actions@github.com"

      - name: Run extraction script
        id: extract
        env:
          LOGIN_URL: ${{ secrets.LOGIN_URL }}
          ACCOUNT: ${{ secrets.ACCOUNT }}
          PASSWORD: ${{ secrets.PASSWORD }}
        run: |
          if [ -n "$LOGIN_URL" ]; then
            echo "LOGIN_URL=$LOGIN_URL" > .env
          fi
          if [ -n "$ACCOUNT" ]; then
            echo "ACCOUNT=$ACCOUNT" >> .env
          fi
          if [ -n "$PASSWORD" ]; then
            echo "PASSWORD=$PASSWORD" >> .env
          fi
          
          node extract_sub.js

      - name: Update data.txt
        run: |
          if [ -f "sub_content.txt" ]; then
            if [ -f "data.txt" ]; then
              cp data.txt data.txt.bak
            fi
            
            cp sub_content.txt data.txt
            
            echo "Last updated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> data.txt
            
            echo "data.txt updated"
            echo "Preview (first 500 chars):"
            head -c 500 data.txt
          else
            echo "No subscription content obtained, skipping update"
            exit 1
          fi

      - name: Commit and push changes
        run: |
          if git diff --stat | grep -q "data.txt"; then
            echo "Changes detected in data.txt, preparing commit..."
            
            git add data.txt
            
            COMMIT_MSG="Auto-update data.txt $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            git commit -m "$COMMIT_MSG"
            
            git push origin ${{ github.ref_name }}
            
            echo "Changes pushed to ${{ github.ref_name }}"
          else
            echo "No changes in data.txt, skipping commit"
          fi
